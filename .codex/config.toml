[features]
multi_agent = true

[agents]
max_threads = 3
max_depth = 1

[agents.planner]
description = "Planning-focused agent. Produces small, reviewable one-PR plans and uses the plan-change skill."
config_file = "../.agents/roles/planner.toml"

[agents.coder]
description = "Implementation-focused agent. Implements only approved plans using the set of /implement*** skill."
config_file = "../.agents/roles/coder.toml"

[agents.validator]
description = "Evidence-driven validation agent. Runs checks, reviews regressions, and uses the validate-charlist skill."
config_file = "../.agents/roles/validator.toml"